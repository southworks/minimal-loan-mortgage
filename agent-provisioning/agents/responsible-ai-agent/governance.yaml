    condition: "tool_name == 'get_case_documents'"
    action: deny
    priority: 100
  - name: deny-enrich-customer-context
    condition: "tool_name == 'enrich_customer_context'"
    action: deny
    priority: 100
  - name: deny-index-case-documents
    condition: "tool_name == 'index_case_documents'"
    action: deny
    priority: 100
  - name: deny-search-case-evidence
    condition: "tool_name == 'search_case_evidence'"
    action: deny
    priority: 100
  - name: deny-get-application-profile
    condition: "tool_name == 'get_application_profile'"
    action: deny
    priority: 100
  - name: deny-get-underwriting-context
    condition: "tool_name == 'get_underwriting_context'"
    action: deny
    priority: 100
  - name: deny-validate-human-decision
    condition: "tool_name == 'validate_human_decision'"
    action: deny
    priority: 100
  - name: deny-build-account-setup-draft
    condition: "tool_name == 'build_account_setup_draft'"
    action: deny
    priority: 100
