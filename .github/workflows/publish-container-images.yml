name: Publish Container Images

on:
  push:
    branches:
      - main
    paths:
      - 'backend/src/Api.Host/**'
      - 'backend/src/LoanWorkflow.Mcp/**'
      - 'frontend/**'
      - 'agent-provisioning/**'
      - 'dataset-seed/**'
      - '.github/workflows/publish-container-images.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: cohereloan

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: cohereloan-api
            dockerfile: backend/src/Api.Host/Dockerfile
          - image: cohereloan-mcp
            dockerfile: backend/src/LoanWorkflow.Mcp/Dockerfile
          - image: cohereloan-webapp
            dockerfile: frontend/src/WebApp/Dockerfile
          - image: cohereloan-provisioning
            dockerfile: agent-provisioning/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}:demo
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}:${{ github.sha }}
